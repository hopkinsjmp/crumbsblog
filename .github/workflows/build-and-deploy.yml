name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab
  schedule:
    - cron: '0 */3 * * *' # rebuild every 3 hours to publish scheduled posts

# Only one deployment at a time; don't cancel in-progress runs
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write      # needed to deploy to GitHub Pages
  id-token: write   # needed to authenticate the deployment

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. pnpm ──────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # ── 3. Node (version from .nvmrc) ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # ── 4. Clean build artefacts ──────────────────────────────────────────────
      - name: Clean build artefacts
        run: rm -rf .next .cache

      # ── 5. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 6. Build Next.js (static export → out/) ──────────────────────────
      - name: Build Next.js (static export)
        run: NEXT_EXPORT=true pnpm exec next build

      # ── 7. Add .nojekyll so GH Pages serves files starting with _ ──────────
      - name: Add .nojekyll
        run: touch out/.nojekyll

      # ── 8. Upload Pages artifact ─────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      # ── 9. Deploy to GitHub Pages ───────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4