query pageQuery {
  ...LayoutQueryFragment
  postConnection {
    edges {
      node {
        id
        date
        title
        draft
        excerpt
        degreeStage
        subject
        heroImg
        tags {
          tag {
            ... on Tag {
              name
            }
          }
        }
        author {
          ... on Author {
            ...AuthorParts
          }
        }
        _sys {
          filename
          breadcrumbs
        }
      }
    }
  }
}

query contentQuery($relativePath: String!) {
  ...LayoutQueryFragment
  page(relativePath: $relativePath) {
    ...PageParts
  }
}

query blogPostQuery($relativePath: String!) {
  ...LayoutQueryFragment
  post(relativePath: $relativePath) {
    ...PostParts
    author {
      ... on Author {
        name
        avatar
      }
    }
  }
}
